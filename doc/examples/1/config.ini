[Astronomical Constants]                # You may use the constants defined in this section in all subsequent sections, e.g. "scope_left = 1.9 * au". Do not remove any parameters from this section!
g = 6.67430e-11                         # [m^3 / (kg * s^2)] Gravitational constant
au = 1.495978707e11                     # [m]   Astronomical unit
l_sun = 3.828e26                        # [W]   Solar luminosity
r_sun = 6.957e8                         # [m]   Solar radius R⊙
m_sun = 1.98847e30                      # [kg]  Solar mass M⊙
r_jup = 7.1492e7                        # [m]   Jupiter radius
m_jup = 1.8981246e27                    # [kg]  Jupiter mass
r_nep = 2.4622e7                        # [m]   Neptune radius
m_nep = 1.024092e26                     # [kg]  Neptune mass
r_earth = 6.378135e6                    # [m]   Earth radius R⊕
m_earth = 5.9720e24                     # [kg]  Earth mass M⊕
hour = 60 * 60                          # [s]   One hour in seconds
day = hour * 24                         # [s]   One day in seconds
year = day * 365.24219                  # [s]   Approximate length of one tropical Earth year
rad2deg = 57.29577951308232             # Conversion factor: radians to degrees (180 / π)

[Results]                               #
results_directory = .                   # Results are saved in the next available numbered subdirectory.
result_file = result.json               # Simulation results, such as transit times, are saved to this file. Comment out this parameter if you do not need the output file.
comment = some comment                  # Optional comment, for example to use as the title of result plots via the Python API.
verbose = True                          # If False, only error messages are printed to the console. Useful when running MCMC.
transit_precision = 1                   # [s] Simulated TT, T1, etc. are calculated to this precision.
max_interval_extensions = 5             # Integer: In unstable systems or when using a very large dt, the search for a Transit Time (TT) may have to be extended. If no TT is found within max_interval_extensions * dt of the expected transit interval, the search for that particular TT is aborted.
flux_data_directory = .                 # Downloaded and processed flux data are saved to this directory.

[Simulation]                            #
action = single_run                     # Allowed values: mcmc (MCMC fit), lmfit (least-squares fit), single_run (run one simulation), get_tess_data, process_tess_data, guifit (upcoming feature), results_only (upcoming feature, read existing results and generate reports).
jacobi_masses = True                    # REBOUND parameter. See https://rebound.hanno-rein.de/ipython_examples/OrbitalElements/ .
dt = 60                                 # [s] Time step between simulation iterations. Use a larger value to improve MCMC performance. Use a smaller value for video generation or when accurate transit times are required.
start_date = 2460000                    # [days] Start date of the simulation, typically expressed as a Barycentric Julian Date (TDB).
starts =  [2460001.9]                   # [days] Start times of the intervals for which simulation data are calculated.
ends =    [2460003.9]                   # [days] End times of the intervals for which simulation data are calculated.
sim_flux_file = sim_flux.csv            # If specified, the simulated flux is saved to this CSV file. The file has the same structure as processed flux data: columns time, flux, and flux_err.
sim_flux_err = 0.0004                   # Gaussian white noise with standard deviation sim_flux_err is added to the simulated flux.

[Fitting]                               #
free_parameters = 0                     # Integer: Number of free parameters in the fitting model. Used to calculate the p-value from the chi-squared statistic.
flux_file = flux.csv                    # Flux measurement file. Must contain the columns "time" (days), "flux" (normalized flux), and "flux_err" (normalized standard deviation).
tt_file = tt.csv                        # Measured transit times. Must contain a column named "tt" with transit midpoints (additional columns are allowed).
eclipsers_names = InnerPlanet, OuterPlanet  # Only primary transits of these bodies are considered when fitting transit times. Separate body names with commas.
eclipsees_names = SomeStar              # Only transits across these bodies are considered when fitting transit times. Separate body names with commas.
rv_file = rv.csv                        # Radial velocity measurements. Expected columns are time, rv_abs, rv_rel, rv_err, and rv_jit. rv_abs and rv_err are currently optional.
rv_body = SomeStar                      # Name of the star for which radial velocities were measured.
tt_padding = 0.3                        # When processing flux data, a plot is generated for each transit. The time axis ranges from tt - tt_padding to tt + tt_padding.
flux_weight = 1                         # Relative weight of flux residuals compared with RV and TT residuals.
tt_weight = 1                           # Relative weight of TT residuals compared with RV and flux residuals.
rv_weight = 1                           # Relative weight of RV residuals compared with TT and flux residuals.
bins = 30, 200                          # Integer(s): Number of bins in mcmc histograms. Multiple values may be specified, separated by commas. Then a histogram will be generated for every bin value.
flux_plots_top = 1.0015                 # Upper y-axis limit for normalized flux plots.
flux_plots_bottom = 0.9985              # Lower y-axis limit for normalized flux plots.
unit =  '{"mass": "m_jup", "radius": "r_jup", "e": "1", "i": "deg", "P": "d", "a": "AU", "Omega": "deg", "omega": "deg", "pomega": "deg", "L": "deg", "ma": "deg", "ea": "deg", "nu": "deg", "T": "s", "t": "s"}'  # Specify the display unit for each parameter in result plots.
scale =  '{"mass": 1/m_jup, "radius": 1/r_jup, "e": 1, "i": rad2deg, "P": 1/day, "a": 1/au, "Omega": rad2deg, "omega": rad2deg, "pomega": rad2deg, "L": rad2deg, "ma": rad2deg, "ea": rad2deg, "nu": rad2deg, "T": 1, "t": 1}'  # Conversion factors applied to each parameter so that values are displayed in the units specified in parameter unit.

[Video]                                 #
video_file = video.mp4                  # The generated video is saved to this file. Comment out this parameter to disable video generation.
frames = 10                             # Integer: Number of video frames. Increasing this value increases both rendering time and animation length.
fps = 5                                 # Integer: Frames per second. Set to 25 or higher for good quality. Higher values make the animation play faster and shorten its duration.
clockwise = False                       # When viewed from above, do the bodies orbit their primary clockwise?

[VideoScale]                            # Controls the visual scale of objects in the animation.
scope_left = 1.1 * au                   # [m] The left plot displays the region [-scope_left, scope_left]. The plot is centered on (0, 0).
scale_bar_length_left = 0.1 * au        # [m] Real-world length represented by the scale bar in the left plot.
star_scale_left = 4.0                   # If autoscaling is disabled, star radii are multiplied by this factor in the left view.
planet_scale_left = 150.0               # If autoscaling is disabled, planet radii are multiplied by this factor in the left view.
scope_right = 0.015 * au                # [m] The right plot displays the region [-scope_right, scope_right]. The plot is centered on (0, 0).
scale_bar_length_right = 0.01 * au      # [m] Real-world length represented by the scale bar in the right plot.
star_scale_right = 1.0                  # If autoscaling is disabled, star radii are multiplied by this factor in the right view.
planet_scale_right = 1.0                # If autoscaling is disabled, planet radii are multiplied by this factor in the right view.
autoscaling = off                       # Allowed values: on, off
min_radius = 0.4                        # [%] If autoscaling is enabled, the smallest celestial body has this radius relative to the plot size. Radius = 100 would fill the entire plot.
max_radius = 2.0                        # [%] If autoscaling is enabled, the largest celestial body has this radius relative to the plot size. Radius = 100 would fill the entire plot. If necessary, scaling is performed logarithmically instead of linearly.

[VideoPlot]                             #
show_left_plot = True                   # Show the star system viewed from above (upper-left plot).
show_right_plot = True                  # Show the star system viewed from Earth (upper-right plot).
show_lc_plot = True                     # Show the light curve plot (flux).
show_rv_plot = True                     # Show the radial velocity plot.
main_title = Example 1                  # Main title of the plot.
left_title = View from above (star enlarged 4x, planets enlarged 150x)  # Title of the left plot.
right_title = View from Earth (to scale, 73x zoom compared to the left side)  # Title of the right plot.
flux_dot_height = 1/17                  # Height of the red dot in the light curve plot relative to the y-axis height.
flux_dot_width = 1/290                  # Width of the red dot in the light curve plot relative to the x-axis width.
rv_dot_height = 1/17                    # Height of the green dot in the radial velocity plot relative to the y-axis height.
rv_dot_width = 1/290                    # Width of the green dot in the radial velocity plot relative to the x-axis width.
figure_width = 16                       # Integer: Width of the figure containing all plots and animations. Adjust this parameter only if the plots in the video do not fit on your screen.
figure_height = 8                       # Integer: Height of the figure containing all plots and animations. Adjust this parameter only if the plots in the video do not fit on your screen.
xlim = 1.25                             # Left and right views show x-values between -xlim and +xlim. Adjust this parameter only if the plots in the video do not fit on your screen.
ylim = 1.0                              # Left and right views show y-values between -ylim and +ylim. Adjust this parameter only if the plots in the video do not fit on your screen.

[SomeStar]                              # All subsequent sections define celestial bodies in the simulation. Section names define the body names. REBOUND supports only plain ASCII characters in body names. When Jacobi coordinates are used, bodies must be ordered from the inside out (e.g., star, inner planet, outer planet).
color = 0.99, 0.99, 0.99                # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = star                        # star or planet
;primary = self                          # If None for all bodies, orbital parameters are interpreted as Jacobi coordinates. Otherwise, primary is used as the REBOUND primary. In the latter case, mark the primary body of the system with primary=self.
mass = 1.0 * m_sun                      # [kg]
radius = 1.0 * r_sun                    # [m]
luminosity = 1.0 * l_sun                # [W]
limb_darkening_parameter_type = u       # limb_darkening_parameter_type = a  # q (Kipping parameters q1, q2), u (quadratic law parameters u1, u2), or a (polynomial coefficients a1, a2; do not provide a0).
limb_darkening_1 = 0.45                 # Limb-darkening coefficient 1.
limb_darkening_2 = 0.23                 # Limb-darkening coefficient 2.

[InnerPlanet]                           #
color = 0.9, 0.9, 0.1                   # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = planet                      # star or planet
;primary = SomeStar                      # If None for all bodies, orbital parameters are interpreted as Jacobi coordinates. Otherwise, primary is used as the REBOUND primary. In the latter case, mark the primary body of the system with primary=self.
mass = 3.0 * m_earth                    # [kg]
radius = 1.5 * r_earth                  # [m]
e = 0.0                                 # [1] Eccentricity.
i = 89.0                                # [deg] Inclination. 90°: the orbit is viewed edge-on. >90°: the planet moves below and in front of the star, as well as above and behind the star in the edge-on view.
a = 0.1 * au                            # [m] Semi-major axis. Provide P or a.
Omega = 0                               # [deg] Ω: longitude of ascending node. Specify two parameters out of Omega, omega, and pomega.
omega = 0                               # [deg] ω: argument of periapsis/pericenter/periastron. Specify two parameters out of Omega, omega, and pomega.
ma = 6                                  # [deg] Mean anomaly. Specify one parameter out of L, ma, ea, nu, and T.

[OuterPlanet]                           #
color = 0.3, 0.5, 0.99                  # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = planet                      # star or planet
;primary = SomeStar                      # If None for all bodies, orbital parameters are interpreted as Jacobi coordinates. Otherwise, primary is used as the REBOUND primary. In the latter case, mark the primary body of the system with primary=self.
mass = 1.0 * m_earth                    # [kg]
radius = 1.0 * r_earth                  # [m]
e = 0.045                               # [1] Eccentricity.
i = 90.2                                # [deg] Inclination. 90°: the orbit is viewed edge-on. >90°: the planet moves below and in front of the star, as well as above and behind the star in the edge-on view.
a = 1.0 * au                            # [m] Semi-major axis. Provide P or a.
Omega = 0                               # [deg] Ω: longitude of ascending node. Specify two parameters out of Omega, omega, and pomega.
omega = 0                               # [deg] ω: argument of periapsis/pericenter/periastron. Specify two parameters out of Omega, omega, and pomega.
ma = 82                                 # [deg] Mean anomaly. Specify one parameter out of L, ma, ea, nu, and T.
