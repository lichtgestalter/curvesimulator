[Astronomical Constants]                # You may use the constants defined in this section in all subsequent sections, e.g. "scope_left = 1.9 * au". Do not remove any parameters from this section!
g = 6.67430e-11                         # [m^3 / (kg * s^2)] Gravitational constant
au = 1.495978707e11                     # [m]   Astronomical unit
l_sun = 3.828e26                        # [W]   Solar luminosity
r_sun = 6.957e8                         # [m]   Solar radius R⊙
m_sun = 1.98847e30                      # [kg]  Solar mass M⊙
r_jup = 7.1492e7                        # [m]   Jupiter radius
m_jup = 1.8981246e27                    # [kg]  Jupiter mass
r_nep = 2.4622e7                        # [m]   Neptune radius
m_nep = 1.024092e26                     # [kg]  Neptune mass
r_earth = 6.378135e6                    # [m]   Earth radius R⊕
m_earth = 5.9720e24                     # [kg]  Earth mass M⊕
hour = 60 * 60                          # [s]   One hour in seconds
day = hour * 24                         # [s]   One day in seconds
year = day * 365.24219                  # [s]   Approximate length of one tropical Earth year
rad2deg = 57.29577951308232             # Conversion factor: radians to degrees (180 / π)

[Results]                               #
results_directory = .                   # Results are saved in the next available numbered subdirectory.

[Simulation]                            #
action = mcmc                           # Allowed values: mcmc (MCMC fit), lmfit (least-squares fit), single_run (run one simulation), get_tess_data, process_tess_data, guifit (upcoming feature), results_only (upcoming feature, read existing results and generate reports).
jacobi_masses = True                    # REBOUND parameter. See https://rebound.hanno-rein.de/ipython_examples/OrbitalElements/ .
dt = 5000                               # [s] Time step between simulation iterations. Use a larger value to improve MCMC performance. Use a smaller value for video generation or when accurate transit times are required.
start_date = 2460000                    # [days] Start date of the simulation, typically expressed as a Barycentric Julian Date (TDB).
starts =  [2460001.9]                   # [days] Start times of the intervals for which simulation data are calculated.
ends =    [2460003.9]                   # [days] End times of the intervals for which simulation data are calculated.

[Fitting]                               #
mcmc_multi_processing = True            # Enable multiprocessing for significantly faster MCMC execution. Disable only for debugging MCMC.
;backend = backend.h5                    # Filename of the emcee checkpoint file. Useful after a computer crash or power failure. No backup is generated if parameter is None.
;load_backend = True                     # Resume MCMC from the existing emcee checkpoint instead of starting from scratch.
walkers = 32                            # Integer: Number of MCMC walkers.
steps = 1e8                             # Integer: Number of MCMC steps after the burn-in phase. Simply use a huge number and stop the program when the results are stable.
moves = (emcee.moves.StretchMove()     , 0.6), (emcee.moves.DEMove       (), 0.4)  # emcee parameter. See https://emcee.readthedocs.io/en/stable/user/moves/ .
burn_in = 100                           # Should be much higher in real use cases. Integer: Number of initial MCMC samples discarded as burn-in. Must be positive.
chunk_size = 100                        # Integer: Results are generated and saved every chunk_size steps after burn-in.
thin_samples = 10                       # Integer: Retain every <thin_samples>-th sample from the MCMC chain to reduce autocorrelation and output size.
free_parameters = 2                     # Integer: Number of free parameters in the fitting model. Used to calculate the p-value from the chi-squared statistic.
flux_file = flux.csv                    # Flux measurement file. Must contain the columns "time" (days), "flux" (normalized flux), and "flux_err" (normalized standard deviation).
flux_plots_top = 1.01                   # Upper y-axis limit for normalized flux plots.
flux_plots_bottom = 0.975               # Lower y-axis limit for normalized flux plots.
bins = 30, 200                          # Integer(s): Number of bins in mcmc histograms. Multiple values may be specified, separated by commas. Then a histogram will be generated for every bin value.
unit =  {"mass": "m_jup", "radius": "r_jup", "e": "1", "i": "deg", "P": "d", "a": "AU", "Omega": "deg", "omega": "deg", "pomega": "deg", "L": "deg", "ma": "deg", "ea": "deg", "nu": "deg", "T": "s", "t": "s"}  # Specify the display unit for each parameter in result plots.
scale =  {"mass": 1/m_jup, "radius": 1/r_jup, "e": 1, "i": rad2deg, "P": 1/day, "a": 1/au, "Omega": rad2deg, "omega": rad2deg, "pomega": rad2deg, "L": rad2deg, "ma": rad2deg, "ea": rad2deg, "nu": rad2deg, "T": 1, "t": 1}  # Conversion factors applied to each parameter so that values are displayed in the units specified in parameter unit.

[SomeStar]                              # All subsequent sections define celestial bodies in the simulation. Section names define the body names. REBOUND supports only plain ASCII characters in body names. When Jacobi coordinates are used, bodies must be ordered from the inside out (e.g., star, inner planet, outer planet).
color = 0.99, 0.99, 0.99                # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = star                        # star or planet
mass = 1.0 * m_sun                      # [kg]
radius = 1.0 * r_sun                    # [m]
luminosity = 1.0 * l_sun                # [W]
limb_darkening_parameter_type = u       # limb_darkening_parameter_type = a  # q (Kipping parameters q1, q2), u (quadratic law parameters u1, u2), or a (polynomial coefficients a1, a2; do not provide a0).
limb_darkening_1 = 0.45                 # Limb-darkening coefficient 1.
limb_darkening_2 = 0.23                 # Limb-darkening coefficient 2.

[InnerPlanet]                           #
color = 0.9, 0.9, 0.1                   # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = planet                      # star or planet
mass = 3.0 * m_earth                    # [kg]
radius = 1.5 * r_earth                  # [m]
e = 0.0                                 # [1] Eccentricity.
i = 89.0                                # [deg] Inclination. 90°: the orbit is viewed edge-on. >90°: the planet moves below and in front of the star, as well as above and behind the star in the edge-on view.
a = 0.1 * au                            # [m] Semi-major axis. Provide P or a.
Omega = 0                               # [deg] Ω: longitude of ascending node. Specify two parameters out of Omega, omega, and pomega.
omega = 0                               # [deg] ω: argument of periapsis/pericenter/periastron. Specify two parameters out of Omega, omega, and pomega.
ma = 6, -20, 30, 10                     # [deg] Mean anomaly. Specify one parameter out of L, ma, ea, nu, and T.

[OuterPlanet]                           #
color = 0.3, 0.5, 0.99                  # [1], [1], [1] RGB values used in the animation. All three values must be between 0 and 1.
body_type = planet                      # star or planet
mass = 1.0 * m_earth                    # [kg]
radius = 1.0 * r_earth                  # [m]
e = 0.045                               # [1] Eccentricity.
i = 90.2                                # [deg] Inclination. 90°: the orbit is viewed edge-on. >90°: the planet moves below and in front of the star, as well as above and behind the star in the edge-on view.
a = 1.0 * au                            # [m] Semi-major axis. Provide P or a.
Omega = 0                               # [deg] Ω: longitude of ascending node. Specify two parameters out of Omega, omega, and pomega.
omega = 0                               # [deg] ω: argument of periapsis/pericenter/periastron. Specify two parameters out of Omega, omega, and pomega.
ma = 82, 0, 180, 10                     # [deg] Mean anomaly. Specify one parameter out of L, ma, ea, nu, and T.
